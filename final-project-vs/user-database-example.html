<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Database Example</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        header p {
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            font-size: 14px;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: #6c757d;
        }

        button.danger {
            background: #dc3545;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .status {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .output {
            background: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            margin-top: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        .output pre {
            margin: 0;
            font-size: 12px;
            color: #333;
        }

        .user-info {
            background: white;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #28a745;
            margin-bottom: 15px;
        }

        .user-info p {
            margin: 5px 0;
            color: #333;
        }

        .data-list {
            list-style: none;
        }

        .data-list li {
            background: white;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e0e0e0;
        }

        .data-list strong {
            color: #667eea;
        }

        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🗄️ User Database System</h1>
            <p>Register, Login, and Store User Data</p>
        </header>

        <div class="content">
            <!-- Status Messages -->
            <div id="status"></div>

            <!-- Login/Register Section -->
            <div id="authSection">
                <div class="section">
                    <h2>Create Account</h2>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="regUsername" placeholder="Enter username">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" placeholder="Enter email">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="regPassword" placeholder="Enter password">
                    </div>
                    <button onclick="handleRegister()">Register</button>
                </div>

                <div class="section">
                    <h2>Login</h2>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="loginUsername" placeholder="Enter username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter password">
                    </div>
                    <button onclick="handleLogin()">Login</button>
                </div>
            </div>

            <!-- Main App Section (hidden until login) -->
            <div id="appSection" class="hidden">
                <button class="logout-btn" onclick="handleLogout()">Logout</button>

                <!-- User Info -->
                <div id="userInfo"></div>

                <!-- Save Data Section -->
                <div class="section">
                    <h2>Save User Data</h2>
                    <div class="form-group">
                        <label>Data Key</label>
                        <input type="text" id="dataKey" placeholder="e.g., favorite_song, high_score, bio">
                    </div>
                    <div class="form-group">
                        <label>Data Value</label>
                        <textarea id="dataValue" placeholder="Enter data value"></textarea>
                    </div>
                    <button onclick="handleSaveData()">Save Data</button>
                </div>

                <!-- Retrieve Data Section -->
                <div class="section">
                    <h2>Your Data</h2>
                    <div class="button-group">
                        <button onclick="handleGetAllData()">Load All Data</button>
                        <button class="secondary" onclick="refreshUserData()">Refresh</button>
                    </div>
                    <ul class="data-list" id="dataList"></ul>
                </div>

                <!-- Get Specific Data Section -->
                <div class="section">
                    <h2>Retrieve Specific Data</h2>
                    <div class="form-group">
                        <label>Data Key</label>
                        <input type="text" id="retrieveKey" placeholder="Enter key to retrieve">
                    </div>
                    <button onclick="handleGetSpecificData()">Retrieve</button>
                    <div id="retrieveOutput"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="db-client.js"></script>
    <script>
        // Initialize on page load
        window.onload = () => {
            if (db.isLoggedIn()) {
                showApp();
                refreshUserData();
            } else {
                showAuth();
            }
        };

        // Show/Hide sections
        function showAuth() {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('appSection').classList.add('hidden');
        }

        function showApp() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            updateUserInfo();
        }

        // Update user info display
        function updateUserInfo() {
            const info = `
                <div class="user-info">
                    <p><strong>Logged in as:</strong> ${db.username}</p>
                    <p><strong>User ID:</strong> ${db.userId}</p>
                </div>
            `;
            document.getElementById('userInfo').innerHTML = info;
        }

        // Handle registration
        async function handleRegister() {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            if (!username || !email || !password) {
                showStatus('Please fill in all fields', 'error');
                return;
            }

            const result = await db.register(username, email, password);
            if (result.userId) {
                showStatus(`✓ Registered successfully! Welcome, ${username}!`, 'success');
                setTimeout(showApp, 1000);
            } else {
                showStatus(`✗ ${result.error}`, 'error');
            }
        }

        // Handle login
        async function handleLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showStatus('Please enter username and password', 'error');
                return;
            }

            const result = await db.login(username, password);
            if (result.userId) {
                showStatus(`✓ Logged in successfully!`, 'success');
                setTimeout(showApp, 1000);
            } else {
                showStatus(`✗ ${result.error}`, 'error');
            }
        }

        // Handle logout
        function handleLogout() {
            db.logout();
            showStatus('Logged out successfully', 'info');
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regEmail').value = '';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            showAuth();
        }

        // Handle save data
        async function handleSaveData() {
            const key = document.getElementById('dataKey').value;
            const value = document.getElementById('dataValue').value;

            if (!key || !value) {
                showStatus('Please enter both key and value', 'error');
                return;
            }

            const result = await db.saveData(key, value);
            if (result.message) {
                showStatus(`✓ Data saved: ${key}`, 'success');
                document.getElementById('dataKey').value = '';
                document.getElementById('dataValue').value = '';
                refreshUserData();
            } else {
                showStatus(`✗ ${result.error}`, 'error');
            }
        }

        // Handle get all data
        async function handleGetAllData() {
            const data = await db.getAllData();
            if (data.length === 0) {
                showStatus('No data found. Save some data first!', 'info');
                return;
            }
            showStatus(`✓ Loaded ${data.length} items`, 'success');
            displayData(data);
        }

        // Handle get specific data
        async function handleGetSpecificData() {
            const key = document.getElementById('retrieveKey').value;
            if (!key) {
                showStatus('Please enter a key', 'error');
                return;
            }

            const data = await db.getData(key);
            const output = document.getElementById('retrieveOutput');
            if (!data) {
                output.innerHTML = '<div class="status error">✗ Data not found</div>';
                return;
            }
            output.innerHTML = `<div class="output"><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
        }

        // Refresh user data display
        async function refreshUserData() {
            const data = await db.getAllData();
            if (data.length === 0) {
                document.getElementById('dataList').innerHTML = '<li><em>No data saved yet</em></li>';
            } else {
                displayData(data);
            }
        }

        // Display data in list format
        function displayData(data) {
            const list = document.getElementById('dataList');
            list.innerHTML = data.map((item, index) => `
                <li>
                    <div>
                        <strong>${item.data_key}:</strong> ${item.data_value}
                        <br>
                        <small style="color: #999;">Updated: ${new Date(item.updated_at).toLocaleDateString()}</small>
                    </div>
                    <button class="danger" style="margin: 0;" onclick="handleDeleteData('${item.data_key}')">Delete</button>
                </li>
            `).join('');
        }

        // Handle delete data
        async function handleDeleteData(key) {
            if (confirm(`Delete "${key}"?`)) {
                const result = await db.deleteData(key);
                if (result.deletedRows > 0) {
                    showStatus(`✓ Data deleted: ${key}`, 'success');
                    refreshUserData();
                } else {
                    showStatus(`✗ Failed to delete`, 'error');
                }
            }
        }

        // Show status message
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.innerHTML = `<div class="status ${type}">${message}</div>`;
            setTimeout(() => {
                status.innerHTML = '';
            }, 5000);
        }
    </script>
</body>
</html>
