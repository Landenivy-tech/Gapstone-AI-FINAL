<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Data</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <nav>
            <ul>
                <li><a href="leaderboard.html">Leaderboard</a></li>
                <li><a href="import.html">Import</a></li>
                <li><a href="info.html">Info</a></li>
            </ul>
        </nav>
        <header>
            <h1>📥 Import Data to Database</h1>
            <p class="subtitle">Add your music data - songs will be saved to the database</p>
            <div class="database-notice">
                <strong>💾 Database Storage:</strong> All imported songs are saved to the server database and will persist across sessions.
            </div>
        </header>

        <div class="import-section">
            <div id="dbStatus" class="db-status">
                <span id="statusIcon">🔄</span>
                <span id="statusText">Checking database connection...</span>
            </div>

            <label for="songTitle">Song Title:</label>
            <input type="text" id="songTitle" placeholder="Enter song title...">

            <label for="artistName">Artist:</label>
            <input type="text" id="artistName" placeholder="Enter artist name...">

            <label for="listensCount">Listens:</label>
            <input type="number" id="listensCount" placeholder="Enter number of listens...">

            <button onclick="addSong()">Add Song</button>
            <button onclick="importAllSongs()" class="import-btn">Import All</button>
            <button onclick="clearAllFields()" class="clear-btn">Clear</button>

            <div id="songsList"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Check database connection on page load
        window.addEventListener('DOMContentLoaded', async function() {
            await checkDatabaseConnection();
        });

        async function checkDatabaseConnection() {
            const statusDiv = document.getElementById('dbStatus');
            const statusIcon = document.getElementById('statusIcon');
            const statusText = document.getElementById('statusText');

            try {
                const response = await fetch('/api/stats');
                if (response.ok) {
                    statusDiv.className = 'db-status connected';
                    statusIcon.textContent = '✅';
                    statusText.textContent = 'Database connected - songs will be saved permanently';
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                statusDiv.className = 'db-status error';
                statusIcon.textContent = '❌';
                statusText.textContent = 'Database not available - imports will fail';
                console.error('Database connection check failed:', error);
            }
        }
    </script>
</body>
</html>
