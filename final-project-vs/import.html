<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Data</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <nav>
            <ul>
                <li><a href="leaderboard.html">Leaderboard</a></li>
                <li><a href="import.html">Import</a></li>
                <li><a href="info.html">Info</a></li>
            </ul>
        </nav>
        <header>
            <h1>📥 Import Data</h1>
            <p class="subtitle">Add your music data here</p>
        </header>

        <div class="import-section">
            <label for="songTitle">Song Title:</label>
            <input type="text" id="songTitle" placeholder="Enter song title...">

            <label for="artistName">Artist:</label>
            <input type="text" id="artistName" placeholder="Enter artist name...">

            <label for="listensCount">Listens:</label>
            <input type="number" id="listensCount" placeholder="Enter number of listens...">

            <button onclick="addSong()">Add Song</button>
            <button onclick="importAllSongs()" class="import-btn">Import All</button>
            <button onclick="clearAllFields()" class="clear-btn">Clear</button>

            <div id="songsList"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
